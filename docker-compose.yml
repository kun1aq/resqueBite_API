services:
  postgres:
    image: postgres:15
    container_name: rescuebite_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rescuebite_db
    ports:
      - "5432:5432"
    volumes:
      - rescuebite_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rescuebite_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  rescuebite_pgdata: