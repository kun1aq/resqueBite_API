<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Courier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-2xl font-bold">Courier Dashboard</h1>

    <div class="space-x-4">
        <a href="index.html">Home</a>
        <button onclick="logout()" class="text-red-500">Logout</button>
    </div>
</nav>

<main class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
    <section>
        <h2 class="text-2xl font-bold mb-4">Available Deliveries</h2>
        <div id="availableContainer" class="space-y-4"></div>
    </section>

    <section>
        <h2 class="text-2xl font-bold mb-4">My Deliveries</h2>
        <div id="myDeliveriesContainer" class="space-y-4"></div>
    </section>
</main>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/guards.js"></script>

<script>
    requireAuth();
    requireRole("COURIER");
</script>
<script src="./js/courier.js"></script>

</body>
</html>
