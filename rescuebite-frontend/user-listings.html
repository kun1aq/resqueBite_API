<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-2xl font-bold">Available Food</h1>

    <div class="space-x-4">
        <a href="user-listings.html">Listings</a>
        <a href="reservations.html">My Reservations</a>
        <a href="index.html">Home</a>
        <button onclick="logout()" class="text-red-500">Logout</button>
    </div>
</nav>

<main class="p-8">
    <div class="flex gap-4 mb-6">
        <input id="searchInput" placeholder="Search food..." class="border p-3 rounded-lg w-full">

        <select id="statusFilter" class="border p-3 rounded-lg">
            <option value="">All</option>
            <option value="FRESH">Fresh</option>
            <option value="DISCOUNTED">Discounted</option>
            <option value="FREE">Free</option>
        </select>

        <button id="searchBtn" class="bg-green-600 text-white px-6 rounded-lg">
            Search
        </button>
    </div>

    <div id="listingsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <button id="loadMoreBtn" class="mt-8 bg-gray-800 text-white px-6 py-3 rounded-lg hidden">
        Load more
    </button>
</main>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/guards.js"></script>

<script>
    requireAuth();
    requireRole("USER");
</script>
<script src="./js/user-listings.js"></script>

</body>
</html>
